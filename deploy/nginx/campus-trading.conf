# ============================================================
# Nginx 配置文件 - 校园二手交易平台
# 部署路径: /etc/nginx/conf.d/campus-trading.conf
# ============================================================

# 后端上游服务
upstream campus_backend {
    server 127.0.0.1:8080;
    # 如有多实例可继续添加: server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen       80;
    # server_name  your-domain.com;  # 替换为你的域名或公网IP
    server_name  _;

    # 字符集
    charset utf-8;

    # 访问日志
    access_log  /var/log/nginx/campus-trading.access.log  main;
    error_log   /var/log/nginx/campus-trading.error.log;

    # 上传文件大小限制(与后端 spring.servlet.multipart.max-file-size 保持一致)
    client_max_body_size 50m;

    # ============ 前端静态资源 ============
    root /opt/campus-trading/frontend/dist;
    index index.html;

    # 首页与前端路由(SPA 应用 history 模式)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存(带 hash 的 js/css 可长期缓存)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
    }

    # index.html 不缓存(确保发布新版本时立即生效)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # ============ API 反向代理 ============
    # 前端调用 /api/xxx,nginx 去掉 /api 前缀转发到后端
    location /api/ {
        proxy_pass http://campus_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 大文件上传缓冲
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ============ 上传文件访问代理 ============
    # /uploads/xxx 由后端提供,nginx 转发
    location /uploads/ {
        proxy_pass http://campus_backend;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        # 上传图片可缓存
        expires 7d;
        add_header Cache-Control "public";
    }

    # ============ WebSocket 反向代理 ============
    # /ws/chat 由后端 WebSocket 端点处理
    location /ws/ {
        proxy_pass http://campus_backend;
        proxy_http_version 1.1;
        # WebSocket 必需的升级头
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        # WebSocket 长连接超时(默认60s会断开,设长一些)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ============ API 文档(生产环境可注释掉) ============
    location /doc.html {
        proxy_pass http://campus_backend;
        proxy_set_header Host $host;
    }
    location /webjars/ {
        proxy_pass http://campus_backend;
    }
    location /v3/api-docs {
        proxy_pass http://campus_backend;
    }

    # 错误页面
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
